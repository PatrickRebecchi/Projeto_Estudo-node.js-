<section class="login-page">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()" novalidate>
    <div class="login-header">
      <p class="eyebrow">Projeto API</p>
      <h1>Acesse sua conta</h1>
      <p>Entre para continuar no painel.</p>
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="seu@email.com"
        autocomplete="email"
        [class.invalid]="email.invalid && email.touched"
      />
      @if (email.invalid && email.touched) {
        <small class="error-text">Informe um e-mail válido.</small>
      }
    </div>

    <div class="field">
      <label for="password">Senha</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Digite sua senha"
        autocomplete="current-password"
        [class.invalid]="password.invalid && password.touched"
      />
      @if (password.invalid && password.touched) {
        <small class="error-text">A senha deve ter pelo menos 6 caracteres.</small>
      }
    </div>

    @if (errorMessage) {
      <p class="auth-error">{{ errorMessage }}</p>
    }

    <button class="primary-button" type="submit" [disabled]="submitting">
      @if (submitting) {
        <span class="spinner" aria-hidden="true"></span>
      }
      {{ submitting ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>
</section>
